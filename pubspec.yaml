name: vidyasetu
description: "Competitive Learning Arena - Battle. Learn. Conquer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.4
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  glassmorphism: ^3.0.0

  # Navigation
  go_router: ^14.8.1

  # Networking & APIs
  http: ^1.3.0
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/characters/
    - assets/animations/
    - assets/icons/
